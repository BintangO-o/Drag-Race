<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Draw &amp; Race - Ultra Sharp Responsive</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* ============================================================
   RESET & ROOT
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0b0d17;
  --surface:   rgba(18, 21, 31, 0.85);
  --surface2:  #1a1e2e;
  --border2:   rgba(255,255,255,0.15);

  --yellow:    #f7c948;
  --orange:    #ff6b2b;
  --cyan:      #3de8c8;
  --red:       #ff3d5a;
  --green:     #3dffa0;
  --white:     #eef0f8;
  --muted2:    #6a7090;
}

html, body {
  width: 100%;
  height: 100%;
  background: var(--bg);
  color: var(--white);
  font-family: 'Nunito', sans-serif;
  overflow: hidden;
  position: relative;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ============================================================
   GAME WRAPPER & CANVAS (Ukuran diatur dinamis oleh JavaScript)
   ============================================================ */
#game-wrapper {
  position: relative;
  background: #05060f;
  box-shadow: 0 0 60px rgba(0,0,0,0.8);
  overflow: hidden;
  border-radius: 4px; /* Sedikit lengkungan manis saat tidak fullscreen penuh */
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: block;
}

#uiCanvas {
  cursor: crosshair;
  touch-action: none;
  z-index: 5;
}

/* ============================================================
   DYNAMIC HUD INTERFACE Overlay atas Canvas
   ============================================================ */
#hud-overlay {
  position: absolute;
  top: max(10px, env(safe-area-inset-top));
  left: max(10px, env(safe-area-inset-left));
  right: max(10px, env(safe-area-inset-right));
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: center;
  pointer-events: none;
}

.hud-panel {
  background: var(--surface);
  border: 1px solid var(--border2);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 6px 14px;
  border-radius: 10px;
  display: flex;
  gap: 16px;
  pointer-events: auto;
}

.stat-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 45px;
}
.stat-label {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  text-transform: uppercase;
  color: var(--muted2);
  letter-spacing: 0.5px;
}
.stat-value {
  font-family: 'DM Mono', monospace;
  font-size: clamp(14px, 2.5vw, 18px);
  font-weight: bold;
}

#center-branding {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(16px, 3.5vw, 26px);
  color: var(--yellow);
  letter-spacing: 1.5px;
  text-shadow: 0 0 15px rgba(247,201,72,0.4);
}

.btn-fs {
  background: rgba(26, 30, 46, 0.8);
  border: 1px solid var(--border2);
  color: var(--white);
  border-radius: 6px;
  width: 32px;
  height: 32px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: all 0.15s;
}
.btn-fs:hover {
  border-color: var(--yellow);
  color: var(--yellow);
}

#draw-counter {
  position: absolute;
  bottom: 12px;
  right: max(12px, env(safe-area-inset-right));
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 3px 10px;
  background: rgba(0,0,0,0.7);
  border: 1px solid var(--border2);
  border-radius: 20px;
  z-index: 10;
  pointer-events: none;
}
#draw-counter.ready span { color: var(--green); font-weight: bold; }
#draw-counter.cooldown span { color: var(--red); }

/* ============================================================
   OVERLAY MENU SCREEN (START / GAME OVER)
   ============================================================ */
.dom-overlay {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  background: rgba(11,13,23,0.92);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 20;
  animation: fadeIn 0.2s ease;
  padding: 20px;
  text-align: center;
}
.dom-overlay.visible { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.overlay-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(32px, 6vw, 56px);
  color: var(--yellow);
  text-shadow: 0 0 30px rgba(247,201,72,0.4);
  line-height: 1;
}
.overlay-score {
  font-family: 'DM Mono', monospace;
  font-size: clamp(36px, 8vw, 64px);
  font-weight: bold;
}
.new-record {
  display: none;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  color: var(--cyan);
  letter-spacing: 1.5px;
  animation: pulse 0.5s infinite alternate;
}
.new-record.show { display: block; }
@keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }

.btn-play {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 1.5px;
  padding: 10px 40px;
  border: 2px solid var(--yellow);
  background: transparent;
  color: var(--yellow);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-play:hover {
  background: var(--yellow);
  color: var(--bg);
  box-shadow: 0 0 20px rgba(247,201,72,0.4);
}
</style>
</head>
<body>

<div id="game-wrapper">

  <div id="hud-overlay">
    <div class="hud-panel">
      <button class="btn-fs" id="fsBtn" title="Fullscreen">🗖</button>
      <div class="stat-block">
        <span class="stat-label">Jarak</span>
        <span class="stat-value" id="scoreTxt">0</span>
      </div>
    </div>

    <div id="center-branding">Draw &amp; Race</div>

    <div class="hud-panel">
      <div class="stat-block">
        <span class="stat-label">Rekor</span>
        <span class="stat-value" id="bestTxt">0</span>
      </div>
      <div class="stat-block">
        <span class="stat-label">Speed</span>
        <span class="stat-value" id="speedTxt" style="color:var(--cyan)">1.0x</span>
      </div>
    </div>
  </div>

  <canvas id="gameCanvas"></canvas>
  <canvas id="uiCanvas"></canvas>

  <div id="draw-counter" class="ready">Tinta: <span id="line-count">READY</span></div>

  <div class="dom-overlay visible" id="startScreen">
    <div style="font-family:'DM Mono'; font-size:10px; color:var(--muted2); letter-spacing:2px;">ARCADE RACING</div>
    <div class="overlay-title">Draw &amp; Race</div>
    <p style="font-size:12px; color:var(--muted2); max-width:400px; line-height:1.6;">
      Gambar lintasan kuning di layar untuk melintasi jurang dan menghindari laser atau duri merah energik.
    </p>
    <button class="btn-play" id="startBtn">MULAI BERMAIN ▶</button>
  </div>

  <div class="dom-overlay" id="gameOverScreen">
    <div style="font-family:'DM Mono'; font-size:10px; color:var(--red); letter-spacing:1px;">CRASHED / WASTED</div>
    <div class="overlay-title">Game Over</div>
    <div class="overlay-score" id="finalScore">0 <span style="font-size:20px; color:var(--muted2)">m</span></div>
    <div style="font-family:'DM Mono'; font-size:12px; color:var(--orange);" id="bestScoreLine">Best: 0 m</div>
    <div class="new-record" id="newRecordBadge">★ REKOR BARU ★</div>
    <button class="btn-play" id="restartBtn">MAIN LAGI ▶</button>
  </div>

</div>

<script>
"use strict";

const wrapper = document.getElementById('game-wrapper');
const gCanvas = document.getElementById('gameCanvas');
const gCtx    = gCanvas.getContext('2d');
const uCanvas = document.getElementById('uiCanvas');
const uCtx    = uCanvas.getContext('2d');

/* LOGICAL VIRTUAL GAME RESOLUTION (Rasio dasar game 24:11) */
const W = 720;   
const H = 330;  
const TARGET_ASPECT = W / H;

/* ================================================================
   DYNAMIC RESIZER WITH MATHEMATICAL LETTERBOXING
   ================================================================ */
function resizeCanvases() {
  // 1. Ambil ukuran jendela browser yang tersedia saat ini
  const windowWidth = window.innerWidth;
  const windowHeight = window.innerHeight;
  
  let newWidth, newHeight;

  // 2. Kalkulasi ukuran pembungkus agar rasio 24:11 selalu terjaga tanpa meluber keluar layar
  if (windowWidth / windowHeight > TARGET_ASPECT) {
    // Jika layar terlalu lebar (PC/Tablet Landscape)
    newHeight = windowHeight;
    newWidth = windowHeight * TARGET_ASPECT;
  } else {
    // Jika layar terlalu tinggi (HP Potret / Standar)
    newWidth = windowWidth;
    newHeight = windowWidth / TARGET_ASPECT;
  }

  // 3. Terapkan dimensi terbaru ke elemen pembungkus (Wrapper DOM)
  wrapper.style.width = `${newWidth}px`;
  wrapper.style.height = `${newHeight}px`;

  // 4. Boost resolusi internal canvas berdasarkan rasio pixel layar (Retina/HD Display support)
  const dpr = window.devicePixelRatio || 1;
  gCanvas.width  = newWidth * dpr;
  gCanvas.height = newHeight * dpr;
  uCanvas.width  = newWidth * dpr;
  uCanvas.height = newHeight * dpr;

  // 5. Kembalikan dan kalibrasi ulang matrix skala logika koordinat game (720x330)
  gCtx.setTransform(1, 0, 0, 1, 0, 0); 
  gCtx.scale(gCanvas.width / W, gCanvas.height / H);

  uCtx.setTransform(1, 0, 0, 1, 0, 0);
  uCtx.scale(uCanvas.width / W, uCanvas.height / H);
}

// Pasang event listener resize yang stabil
window.addEventListener('resize', resizeCanvases);
window.addEventListener('orientationchange', () => {
  setTimeout(resizeCanvases, 200); // Beri jeda sedikit agar rotasi OS selesai terlebih dahulu
});

/* ================================================================
   GAME CONSTANTS
   ================================================================ */
const C = {
  GRAVITY:        0.5,
  BASE_CAR_SPEED: 2.8,       
  SPEED_ACCEL:    0.0008,    
  MAX_SPEED_MULT: 4.5,       
  CAR_W:          40,
  CAR_H:          18,
  WHEEL_R:        8,
  GROUND_BASE:    268,
  FALL_DEATH:     H + 60,
  LINE_THICK:     6,
  LINE_TOLERANCE: 8,
  LOOK_AHEAD:     900,
  TERRAIN_PRUNE:  200,
  COOLDOWN_TIME:  1.3,       
};

/* ================================================================
   STATE VARIABLES
   ================================================================ */
let gameState   = 'idle';
let score       = 0;
let highScore   = +localStorage.getItem('dr_high') || 0;
let speedMult   = 1.0;      
let rafID       = null;
let lastTS      = 0;
let cooldownTimer = 0;      

let camX = 0;
let terrain = [];
let drawnLines = [];
let car = {};
let drawing    = false;

let drawStartWorld = { x: 0, y: 0 }; 
let drawEndWorld   = { x: 0, y: 0 }; 

let particles  = [];
let bgStars    = [];

/* ================================================================
   UTILITY METHODS WITH ACCURATE VIEWPORT TRANSLATION
   ================================================================ */
const rand  = (a, b)       => a + Math.random() * (b - a);
const clamp = (v, lo, hi)  => Math.max(lo, Math.min(hi, v));
const lerp  = (a, b, t)    => a + (b - a) * t;

const toWorld  = (sx) => sx + camX;
const toScreen = (wx) => wx - camX;

function getPos(e) {
  const rect = uCanvas.getBoundingClientRect();
  const src = (e.touches && e.touches.length > 0) ? e.touches[0] : (e.changedTouches && e.changedTouches.length > 0 ? e.changedTouches[0] : e);
  
  // Konversi posisi klik yang dinamis mengikuti koordinat wrapper 720x330 secara presisi
  return {
    x: ((src.clientX - rect.left) / rect.width) * W,
    y: ((src.clientY - rect.top) / rect.height) * H
  };
}

/* ================================================================
   PROCEDURAL LOGICS & GENERATORS
   ================================================================ */
function initStars() {
  bgStars = [];
  for (let i = 0; i < 90; i++) {
    bgStars.push({ x: rand(0, W), y: rand(0, H * 0.75), r: rand(0.3, 1.4), a: rand(0, Math.PI * 2), spd: rand(0.01, 0.03) });
  }
}

function generateTerrain(fromX, length) {
  if (terrain.length === 0) terrain.push({ type: 'flat', x: -100, y: C.GROUND_BASE, w: 550 });
  let x  = fromX;
  const end = fromX + length;

  while (x < end) {
    const lastSeg  = terrain[terrain.length - 1];
    const prevEndY = segEndY(lastSeg);
    const roll     = Math.random();

    if (x < 250) {
      addFlat(x, prevEndY, rand(150, 250));
    } else if (roll < 0.22) {
      const gw = rand(60, 95);
      terrain.push({ type: 'gap', x, w: gw });
      x += gw;
      addFlat(x, C.GROUND_BASE, rand(180, 300));
    } else if (roll < 0.40) {
      const fw = rand(130, 180);
      const boxH = 28;
      terrain.push({ type: 'flat', x: x, y: prevEndY, w: fw });
      terrain.push({ type: 'box_obstacle', x: x + fw / 2 - 15, y: prevEndY - boxH, w: 30, h: boxH });
      x += fw;
      addFlat(x, prevEndY, rand(180, 300));
    } else if (roll < 0.58) {
      const sw = rand(60, 90);
      terrain.push({ type: 'spikes', x, y: prevEndY, w: sw });
      x += sw;
      addFlat(x, prevEndY, rand(180, 300));
    } else if (roll < 0.75) {
      const rw   = rand(70, 120);
      const dY   = rand(-50, 50);
      const endY = clamp(prevEndY + dY, C.GROUND_BASE - 70, C.GROUND_BASE + 8);
      terrain.push({ type: 'ramp', x, y: prevEndY, w: rw, endY });
      x += rw;
      addFlat(x, endY, rand(180, 300));
    } else {
      addFlat(x, prevEndY, rand(200, 320));
    }
  }
  function addFlat(sx, sy, width) {
    terrain.push({ type: 'flat', x: sx, y: sy, w: width });
    x += width;
  }
}

function segEndY(seg) {
  if (!seg) return C.GROUND_BASE;
  if (seg.type === 'ramp') return seg.endY;
  if (seg.type === 'gap' || seg.type === 'box_obstacle') return C.GROUND_BASE;
  return seg.y;
}

function segSurfaceAt(seg, wx) {
  if (seg.type === 'gap' || seg.type === 'box_obstacle') return null;
  const localX = wx - seg.x;
  if (localX < 0 || localX > seg.w) return null;
  if (seg.type === 'flat' || seg.type === 'spikes') return seg.y;
  if (seg.type === 'ramp') return lerp(seg.y, seg.endY, localX / seg.w);
  return null;
}

/* ================================================================
   PHYSICS ENGINE & LOOP INTERACTION
   ================================================================ */
function drawnLineSurfaceAt(wx, currentCarBottom) {
  let best = null;
  for (const ln of drawnLines) {
    const mnX = Math.min(ln.wx1, ln.wx2);
    const mxX = Math.max(ln.wx1, ln.wx2);
    if (wx < mnX || wx > mxX) continue;
    const span = ln.wx2 - ln.wx1;
    if (Math.abs(span) < 1) continue;
    const t  = (wx - ln.wx1) / span;
    const sy = ln.wy1 + t * (ln.wy2 - ln.wy1);
    if (currentCarBottom > sy + 12) continue;
    if (best === null || sy < best) best = sy;
  }
  return best;
}

function checkObstacleCollisions() {
  const carLeft   = car.x;
  const carRight  = car.x + C.CAR_W;
  const carTop    = car.y;
  const carBottom = car.y + C.CAR_H + C.WHEEL_R;

  for (const seg of terrain) {
    if (seg.type === 'box_obstacle') {
      if (carRight > seg.x && carLeft < seg.x + seg.w && carBottom > seg.y && carTop < seg.y + seg.h) {
        car.alive = false;
      }
    }
    if (seg.type === 'spikes') {
      const wheel1X = car.x + 10;
      const wheel2X = car.x + C.CAR_W - 10;
      if (car.onGround) {
        if ((wheel1X >= seg.x && wheel1X <= seg.x + seg.w) || (wheel2X >= seg.x && wheel2X <= seg.x + seg.w)) {
          const dy = drawnLineSurfaceAt(wheel1X, car.y + C.CAR_H + C.WHEEL_R);
          if (dy === null || dy >= seg.y) car.alive = false;
        }
      }
    }
  }
}

function physicsCar(dt) {
  const carBottomBefore = car.y + C.CAR_H + C.WHEEL_R;
  car.vy += C.GRAVITY * dt;
  car.x  += (C.BASE_CAR_SPEED * speedMult) * dt;
  car.y  += car.vy * dt;

  const probes = [car.x + 10, car.x + C.CAR_W - 10];
  const carBottom = car.y + C.CAR_H + C.WHEEL_R;
  let highestSurface = Infinity;

  for (const wx of probes) {
    for (const seg of terrain) {
      const sy = segSurfaceAt(seg, wx);
      if (sy !== null && carBottomBefore <= sy + 12 && sy < highestSurface) highestSurface = sy;
    }
    const dy = drawnLineSurfaceAt(wx, carBottomBefore);
    if (dy !== null && dy < highestSurface) highestSurface = dy;
  }

  if (highestSurface < Infinity) {
    const penetration = carBottom - highestSurface;
    if (penetration >= 0) {
      car.y -= penetration;
      if (car.vy > 0) {
        car.vy = -car.vy * 0.08;
        if (Math.abs(car.vy) < 0.3) car.vy = 0;
      }
      car.onGround = true;
    } else {
      car.onGround = false;
    }
  } else {
    car.onGround = false;
  }

  checkObstacleCollisions();
  car.wheelAngle += ((C.BASE_CAR_SPEED * speedMult) / C.WHEEL_R) * dt;
  car.lean = lerp(car.lean, clamp(car.vy / 25, -0.4, 0.4), 0.12);
  if (car.y > C.FALL_DEATH) car.alive = false;
}

function spawnDust() {
  if (!car.onGround) return;
  for (let i = 0; i < 2; i++) {
    particles.push({ x: car.x + rand(5, C.CAR_W - 5), y: car.y + C.CAR_H + C.WHEEL_R, vx: rand(-1.2, 0.2), vy: rand(-1.5, -0.3), life: 1.0, r: rand(1.5, 3) });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x   += p.vx * dt; p.y   += p.vy * dt; p.vy  += 0.08 * dt; p.life -= 0.045 * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

/* ================================================================
   GRAPHICS RENDERING ENGINE
   ================================================================ */
function drawSky() {
  const g = gCtx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#05060f'); g.addColorStop(0.6, '#0c0b1a'); g.addColorStop(1, '#18122b');
  gCtx.fillStyle = g; gCtx.fillRect(0, 0, W, H);

  const t = Date.now() * 0.001;
  for (const s of bgStars) {
    gCtx.globalAlpha = 0.2 + 0.5 * Math.abs(Math.sin(s.a + t * s.spd));
    gCtx.fillStyle   = '#ffffff'; gCtx.beginPath(); gCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2); gCtx.fill();
  }
  gCtx.globalAlpha = 1;
}

function drawMountains() {
  const px  = camX * 0.15;
  gCtx.save(); gCtx.fillStyle = '#0f0c24'; gCtx.beginPath();
  const peaks = [[-60,220],[20,160],[90,210],[200,140],[310,190],[420,155],[500,200],[620,145],[700,195],[820,165],[900,210]];
  gCtx.moveTo(peaks[0][0] - (px % W), peaks[0][1]);
  for (const [mx, my] of peaks) gCtx.lineTo(mx - (px % (W + 200)), my);
  gCtx.lineTo(W + 200, H); gCtx.lineTo(-200, H); gCtx.closePath(); gCtx.fill(); gCtx.restore();
}

function drawGroundGrid() {
  gCtx.strokeStyle = 'rgba(107,70,255,0.09)'; gCtx.lineWidth = 1;
  const step = 36; const offX = camX % step;
  for (let x = -offX; x < W + step; x += step) {
    gCtx.beginPath(); gCtx.moveTo(x, C.GROUND_BASE); gCtx.lineTo(x, H); gCtx.stroke();
  }
}

function drawTerrain() {
  gCtx.save();
  for (const seg of terrain) {
    const sx = toScreen(seg.x); const sw = seg.w;
    if (seg.type === 'gap') {
      gCtx.fillStyle = 'rgba(255,61,90,0.05)'; gCtx.fillRect(sx, C.GROUND_BASE, sw, H - C.GROUND_BASE);
      gCtx.strokeStyle = 'rgba(255,61,90,0.4)'; gCtx.lineWidth = 1; gCtx.setLineDash([4, 4]);
      gCtx.beginPath(); gCtx.moveTo(sx, C.GROUND_BASE); gCtx.lineTo(sx, H); gCtx.moveTo(sx + sw, C.GROUND_BASE); gCtx.lineTo(sx + sw, H); gCtx.stroke(); gCtx.setLineDash([]);
      continue;
    }
    if (seg.type === 'box_obstacle') {
      gCtx.save(); gCtx.shadowBlur = 14; gCtx.shadowColor = '#ff3d5a'; gCtx.fillStyle = '#ff3d5a'; gCtx.strokeStyle = '#ffffff'; gCtx.lineWidth = 1.5;
      gCtx.beginPath(); gCtx.roundRect(sx, seg.y, sw, seg.h, 4); gCtx.fill(); gCtx.stroke();
      gCtx.fillStyle = 'rgba(255,255,255,0.2)';
      for (let i = 4; i < seg.h; i += 8) gCtx.fillRect(sx + 3, seg.y + i, sw - 6, 2);
      gCtx.restore(); continue;
    }
    if (seg.type === 'spikes') {
      gCtx.fillStyle = '#1c0f24'; gCtx.fillRect(sx, seg.y, sw, H - seg.y);
      gCtx.fillStyle = '#ff3d5a'; gCtx.beginPath();
      for (let tx = 0; tx < sw; tx += 10) {
        gCtx.moveTo(tx + sx, seg.y); gCtx.lineTo(tx + sx + 5, seg.y - 14); gCtx.lineTo(tx + sx + 10, seg.y);
      }
      gCtx.fill(); gCtx.strokeStyle = '#ff768a'; gCtx.lineWidth = 2;
      gCtx.beginPath(); gCtx.moveTo(sx, seg.y); gCtx.lineTo(sx + sw, seg.y); gCtx.stroke(); continue;
    }

    const y1 = seg.y; const y2 = seg.type === 'ramp' ? seg.endY : seg.y;
    const grad = gCtx.createLinearGradient(0, Math.min(y1,y2), 0, H);
    grad.addColorStop(0, '#211942'); grad.addColorStop(0.15,'#140f2b'); grad.addColorStop(1, '#080614');
    gCtx.fillStyle = grad; gCtx.beginPath(); gCtx.moveTo(sx, y1); gCtx.lineTo(sx + sw, y2); gCtx.lineTo(sx + sw, H); gCtx.lineTo(sx, H); gCtx.closePath(); gCtx.fill();

    gCtx.beginPath(); gCtx.moveTo(sx, y1); gCtx.lineTo(sx + sw, y2);
    gCtx.strokeStyle = '#00f3ff'; gCtx.lineWidth = 3; gCtx.shadowBlur = 10; gCtx.shadowColor = '#00f3ff'; gCtx.stroke(); gCtx.shadowBlur = 0;
  }
  gCtx.restore();
}

function drawPlayerLines() {
  if (drawnLines.length === 0) return;
  gCtx.save();
  for (let i = 0; i < drawnLines.length; i++) {
    const ln = drawnLines[i]; const age = drawnLines.length - 1 - i; const alpha = Math.max(0.15, 1 - age * 0.02);
    const sx1 = toScreen(ln.wx1); const sx2 = toScreen(ln.wx2);
    gCtx.lineWidth = C.LINE_THICK; gCtx.lineCap = 'round';
    gCtx.beginPath(); gCtx.moveTo(sx1, ln.wy1); gCtx.lineTo(sx2, ln.wy2);
    gCtx.strokeStyle = `rgba(247,201,72,${alpha})`; gCtx.stroke();
  }
  gCtx.restore();
}

function drawParticles() {
  for (const p of particles) {
    gCtx.globalAlpha = p.life * 0.55; gCtx.fillStyle = '#f7c948'; gCtx.beginPath(); gCtx.arc(toScreen(p.x), p.y, p.r, 0, Math.PI * 2); gCtx.fill();
  }
  gCtx.globalAlpha = 1;
}

function drawCar() {
  if (!car.alive && gameState !== 'idle') return;
  const sx = toScreen(car.x); const sy = car.y;
  gCtx.save(); gCtx.translate(sx + C.CAR_W / 2, sy + C.CAR_H / 2); gCtx.rotate(car.lean);
  const hw = C.CAR_W / 2; const hh = C.CAR_H / 2;

  gCtx.fillStyle = 'rgba(0,0,0,0.4)'; gCtx.beginPath(); gCtx.ellipse(0, hh + C.WHEEL_R + 4, hw * 0.9, 5, 0, 0, Math.PI * 2); gCtx.fill();
  gCtx.fillStyle = '#f7c948'; gCtx.shadowBlur = 12; gCtx.shadowColor = '#f7c948';
  gCtx.beginPath(); gCtx.roundRect(-hw, -hh, C.CAR_W, C.CAR_H, 5); gCtx.fill(); gCtx.shadowBlur = 0;

  gCtx.fillStyle = '#1a2545'; gCtx.beginPath(); gCtx.roundRect(-hw + 5, -hh + 3, C.CAR_W * 0.45, C.CAR_H - 7, 3); gCtx.fill();
  gCtx.fillStyle = '#ff6b2b'; gCtx.fillRect(-hw + 2, 2, C.CAR_W - 4, 4);

  const wheelXs = [-hw + 10, hw - 10];
  for (const wx of wheelXs) {
    gCtx.fillStyle = '#111111'; gCtx.beginPath(); gCtx.arc(wx, hh, C.WHEEL_R, 0, Math.PI * 2); gCtx.fill();
    gCtx.save(); gCtx.translate(wx, hh); gCtx.rotate(car.wheelAngle); gCtx.strokeStyle = '#aaa'; gCtx.lineWidth = 1.5;
    for (let a = 0; a < Math.PI * 2; a += Math.PI / 2) {
      gCtx.beginPath(); gCtx.moveTo(0, 0); gCtx.lineTo(Math.cos(a) * 5, Math.sin(a) * 5); gCtx.stroke();
    }
    gCtx.restore();
  }
  gCtx.restore();
}

function drawSpeedLines() {
  if (gameState !== 'playing') return;
  gCtx.save(); gCtx.globalAlpha = 0.06 * speedMult; gCtx.strokeStyle = '#ffffff'; gCtx.lineWidth = 1;
  const lineY = car.y + C.CAR_H / 2;
  for (let i = 0; i < 5; i++) {
    const lx = toScreen(car.x) - 20 - i * 8;
    gCtx.beginPath(); gCtx.moveTo(lx, lineY + (i - 2) * 7); gCtx.lineTo(lx - 60 - i * 12, lineY + (i - 2) * 7); gCtx.stroke();
  }
  gCtx.restore();
}

/* ================================================================
   MAIN TICK LOOP
   ================================================================ */
function gameLoop(ts) {
  const raw = ts - lastTS; lastTS = ts;
  const dt  = clamp(raw / 16.667, 0.1, 4.0);

  if (gameState === 'playing' && car.alive) {
    if (speedMult < C.MAX_SPEED_MULT) speedMult += C.SPEED_ACCEL * dt;
    if (cooldownTimer > 0) {
        cooldownTimer -= (raw / 1000); if (cooldownTimer < 0) cooldownTimer = 0;
    }
    physicsCar(dt); spawnDust(); updateParticles(dt);
    camX = car.x - W * 0.3;
    score = Math.floor(car.x / 10);
    if (score > highScore) highScore = score;
    updateHUDValues();

    const lastSeg = terrain[terrain.length - 1];
    if (lastSeg.x + lastSeg.w < car.x + C.LOOK_AHEAD) generateTerrain(lastSeg.x + lastSeg.w, C.LOOK_AHEAD);

    terrain = terrain.filter(s => s.x + (s.w || 50) > camX - C.TERRAIN_PRUNE);
    drawnLines = drawnLines.filter(ln => Math.max(ln.wx1, ln.wx2) > camX - C.TERRAIN_PRUNE);

    if (!car.alive) { triggerGameOver(); return; }
  } else {
    updateParticles(dt);
  }

  drawSky(); drawMountains(); drawGroundGrid(); drawTerrain(); drawPlayerLines(); drawParticles(); drawCar(); drawSpeedLines();

  // Render Preview Line Gambar Jembatan
  uCtx.clearRect(0, 0, W, H);
  if (drawing && gameState === 'playing' && cooldownTimer <= 0) {
    uCtx.save(); uCtx.setLineDash([8, 5]);
    uCtx.beginPath(); uCtx.moveTo(toScreen(drawStartWorld.x), drawStartWorld.y); uCtx.lineTo(toScreen(drawEndWorld.x), drawEndWorld.y);
    uCtx.strokeStyle = 'rgba(247,201,72,0.65)'; uCtx.lineWidth = C.LINE_THICK; uCtx.stroke(); uCtx.restore();
  }

  rafID = requestAnimationFrame(gameLoop);
}

/* ================================================================
   HUD & CORE SYSTEM INTERACTION
   ================================================================ */
function updateHUDValues() {
  document.getElementById('scoreTxt').textContent = score;
  document.getElementById('bestTxt').textContent  = highScore;
  document.getElementById('speedTxt').textContent = speedMult.toFixed(2) + 'x';

  const pill = document.getElementById('draw-counter');
  const countSpan = document.getElementById('line-count');
  if (cooldownTimer > 0) {
      pill.className = "cooldown"; countSpan.textContent = `RELOAD (${cooldownTimer.toFixed(1)}s)`;
  } else {
      pill.className = "ready"; countSpan.textContent = "READY";
  }
}

function resetGame() {
  score = 0; speedMult = 1.0; cooldownTimer = 0; camX = 0;
  terrain = []; drawnLines = []; particles = []; drawing = false;
  generateTerrain(0, C.LOOK_AHEAD + 200);
  car = { x: 80, y: C.GROUND_BASE - C.CAR_H - C.WHEEL_R, vy: 0, lean: 0, wheelAngle: 0, onGround: true, alive: true };
  updateHUDValues();
}

function startGame() {
  document.getElementById('startScreen').classList.remove('visible');
  document.getElementById('gameOverScreen').classList.remove('visible');
  resetGame();
  gameState = 'playing'; lastTS = performance.now();
  cancelAnimationFrame(rafID); rafID = requestAnimationFrame(gameLoop);
}

function triggerGameOver() {
  gameState = 'over';
  const prev = +localStorage.getItem('dr_high') || 0;
  const isNew = score > prev;
  if (isNew) localStorage.setItem('dr_high', score);
  highScore = Math.max(score, highScore);

  document.getElementById('finalScore').innerHTML = `${score} <span style="font-size:24px;color:var(--muted2)">m</span>`;
  document.getElementById('bestScoreLine').textContent = `Best: ${highScore} m`;
  document.getElementById('newRecordBadge').classList.toggle('show', isNew);
  document.getElementById('gameOverScreen').classList.add('visible');
}

/* ================================================================
   INPUT PROCESSING POINTER
   ================================================================ */
function onPointerDown(e) {
  if (gameState !== 'playing' || cooldownTimer > 0) return;
  e.preventDefault(); const p = getPos(e); drawing = true;
  drawStartWorld = { x: toWorld(p.x), y: p.y }; drawEndWorld = { x: toWorld(p.x), y: p.y };
}
function onPointerMove(e) {
  if (!drawing || gameState !== 'playing') return;
  e.preventDefault(); const p = getPos(e); drawEndWorld = { x: toWorld(p.x), y: p.y };
}
function onPointerUp(e) {
  if (!drawing || gameState !== 'playing') return;
  e.preventDefault(); drawing = false;
  const end = getPos(e); const len = Math.hypot(end.x - toScreen(drawStartWorld.x), end.y - drawStartWorld.y);
  if (len < 8) return;

  drawnLines.push({ wx1: drawStartWorld.x, wy1: drawStartWorld.y, wx2: toWorld(end.x), wy2: end.y });
  cooldownTimer = C.COOLDOWN_TIME; updateHUDValues();
}

uCanvas.addEventListener('mousedown',  onPointerDown);
uCanvas.addEventListener('mousemove',  onPointerMove);
uCanvas.addEventListener('mouseup',    onPointerUp);
uCanvas.addEventListener('mouseleave', onPointerUp);
uCanvas.addEventListener('touchstart',  onPointerDown, { passive: false });
uCanvas.addEventListener('touchmove',   onPointerMove, { passive: false });
uCanvas.addEventListener('touchend',    onPointerUp,   { passive: false });

/* ================================================================
   NATIVE FULLSCREEN DEVICE HANDLING API
   ================================================================ */
const fsBtn = document.getElementById('fsBtn');
fsBtn.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen()
      .then(() => { fsBtn.textContent = "🗗"; })
      .catch(err => alert(`Gagal masuk mode fullscreen: ${err.message}`));
  } else {
    document.exitFullscreen().then(() => { fsBtn.textContent = "🗖"; });
  }
});
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) {
    fsBtn.textContent = "🗖";
  }
  // Paksa render kalkulasi ulang setiap kali status fullscreen berganti halaman
  setTimeout(resizeCanvases, 150);
});

/* ================================================================
   BOOTSTRAP STARTUP
   ================================================================ */
resizeCanvases();
initStars();
resetGame();
updateHUDValues();

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);

lastTS = performance.now();
rafID  = requestAnimationFrame(gameLoop);
</script>
</body>
</html>
